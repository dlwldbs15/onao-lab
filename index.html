<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오나오 랩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" integrity="sha384-DKYJZ8NLiK8MN4/C5P2dtSmLQ4KwPaoqAfyA/DfmEc1VDxu4yyC7wy6K1Hs90nka" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --cream:#F5ECD9;
    --cream-dark:#EAE0C8;
    --card:#FFFDF8;
    --walnut:#3E2E22;
    --walnut-soft:#6B5847;
    --sage:#7C9473;
    --sage-dark:#5E7455;
    --honey:#E8A33D;
    --honey-dark:#C9821F;
    --berry:#C6577A;
    --line: rgba(62,46,34,0.12);
    --shadow: 0 8px 24px rgba(62,46,34,0.10);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);color:var(--walnut);font-family:'Inter',sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  /* header */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{font-size:34px;line-height:1;}
  h1{font-family:'Baloo 2',sans-serif;font-size:30px;font-weight:800;margin:0;letter-spacing:-0.5px;}
  .sub{font-size:13px;color:var(--walnut-soft);margin-top:2px;}
  .save-btn{background:var(--walnut);color:var(--cream);border:none;border-radius:100px;padding:11px 20px;font-family:'Baloo 2';font-weight:700;font-size:14px;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s ease;}
  .save-btn:hover{transform:translateY(-2px);}
  .save-btn:active{transform:translateY(0);}

  /* recipe rail */
  .rail{display:flex;gap:12px;overflow-x:auto;padding:6px 2px 16px;margin-bottom:14px;}
  .rail::-webkit-scrollbar{height:6px;}
  .rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;}
  .rcard{flex:0 0 auto;width:150px;background:var(--card);border:2px solid transparent;border-radius:18px;padding:14px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s ease, transform .15s ease;position:relative;}
  .fav-star{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;border:none;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;z-index:2;transition:transform .12s ease;}
  .fav-star:hover{transform:scale(1.15);}
  .fav-star.active{background:#FBEBCB;}
  .fav-filter-btn{flex:0 0 auto;display:flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:var(--card);border-radius:100px;padding:8px 14px;font-family:'Baloo 2';font-weight:700;font-size:12.5px;cursor:pointer;color:var(--walnut-soft);align-self:center;margin-right:4px;}
  .fav-filter-btn.active{border-color:var(--honey);background:#FBEBCB;color:var(--walnut);}
  .rcard:hover{transform:translateY(-2px);}
  .rcard.active{border-color:var(--honey);}
  .rcard .em{font-size:26px;}
  .rcard .nm{font-family:'Baloo 2';font-weight:700;font-size:14.5px;margin-top:6px;line-height:1.25;}
  .rcard .tag{font-size:11px;color:var(--walnut-soft);margin-top:4px;}
  .rcard.new{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:2px dashed var(--line);background:transparent;box-shadow:none;color:var(--walnut-soft);}
  .rcard.new .em{font-size:22px;}

  /* main grid */
  .grid{display:grid;grid-template-columns:1.05fr 0.95fr;gap:20px;}
  @media (max-width:880px){.grid{grid-template-columns:1fr;}}
  .panel{background:var(--card);border-radius:22px;padding:22px;box-shadow:var(--shadow);}

  /* bowl */
  .bowl-stage{display:flex;flex-direction:column;align-items:center;padding-top:4px;}
  .bowl-title{font-family:'Baloo 2';font-weight:700;font-size:16px;align-self:flex-start;margin-bottom:6px;}
  .recipe-name-input{font-family:'Baloo 2';font-weight:700;font-size:16px;border:none;background:transparent;align-self:flex-start;margin-bottom:6px;color:var(--walnut);width:100%;padding:0;}
  .recipe-name-input:focus{outline:none;border-bottom:1.5px dashed var(--honey);}
  svg.bowl{width:220px;height:210px;}
  .spoons-block{width:100%;margin-top:6px;}
  .ing-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);}
  .ing-row:last-child{border-bottom:none;}
  .ing-em{font-size:20px;width:26px;text-align:center;}
  .ing-name{flex:1;font-size:13.5px;font-weight:600;}
  .ing-info{cursor:pointer;border-radius:8px;}
  .ing-info:hover .ing-name{color:var(--honey-dark);text-decoration:underline dotted;}
  .info-kcal-hero{display:flex;align-items:baseline;gap:8px;margin:6px 0 14px;}
  .info-kcal-hero .num{font-family:'Baloo 2';font-size:36px;font-weight:800;color:var(--honey-dark);line-height:1;}
  .info-kcal-hero .per{font-size:12px;color:var(--walnut-soft);}
  .info-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .info-table th{text-align:left;font-weight:600;color:var(--walnut-soft);padding:6px 0;border-bottom:1px solid var(--line);font-size:11.5px;}
  .info-table td{padding:7px 0;border-bottom:1px solid var(--line);}
  .info-table td:nth-child(2), .info-table td:nth-child(3), .info-table th:nth-child(2), .info-table th:nth-child(3){text-align:right;font-family:'JetBrains Mono';}
  .ing-spoons{display:flex;gap:2px;}
  .spoon-icon{font-size:13px;opacity:0.18;}
  .spoon-icon.filled{opacity:1;}
  .spoon-icon.half{opacity:1;background:linear-gradient(90deg, rgba(0,0,0,1) 50%, rgba(0,0,0,0.18) 50%);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .drag-handle{display:flex;align-items:center;justify-content:center;width:22px;height:100%;font-size:16px;color:var(--walnut-soft);cursor:grab;touch-action:none;user-select:none;flex:0 0 auto;}
  .drag-handle:active{cursor:grabbing;}
  .ing-row.dragging{background:var(--cream-dark);border-radius:12px;}
  .ing-row.drag-hover{box-shadow:inset 0 2px 0 var(--honey);}
  .stepper{display:flex;align-items:center;gap:8px;background:var(--cream-dark);border-radius:100px;padding:3px;}
  .stepper button{width:22px;height:22px;border-radius:50%;border:none;background:var(--card);font-size:14px;font-weight:700;cursor:pointer;color:var(--walnut);line-height:1;}
  .stepper button:hover{background:var(--honey);color:#fff;}
  .stepper .val{font-family:'JetBrains Mono';font-size:12px;width:16px;text-align:center;}
  .ing-remove{border:none;background:none;color:var(--berry);cursor:pointer;font-size:14px;opacity:0.55;padding:2px 4px;}
  .ing-remove:hover{opacity:1;}

  .add-ing-btn{margin-top:10px;width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:14px;padding:10px;font-size:13px;font-weight:600;color:var(--walnut-soft);cursor:pointer;}
  .add-ing-btn:hover{border-color:var(--honey);color:var(--honey-dark);}

  /* liquid */
  .liquid-block{margin-top:18px;width:100%;}
  .liquid-title{font-family:'Baloo 2';font-weight:700;font-size:14px;margin-bottom:8px;}
  .liquid-choices{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .lchip{border:1.5px solid var(--line);background:var(--cream-dark);border-radius:100px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
  .lchip.active{border-color:var(--honey);background:#FBEBCB;}
  .ml-row{display:flex;align-items:center;gap:10px;}
  input[type=range]{flex:1;accent-color:var(--honey);}
  .ml-val{font-family:'JetBrains Mono';font-size:12.5px;width:56px;text-align:right;color:var(--walnut-soft);}

  /* nutrition panel */
  .n-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
  .n-head h2{font-family:'Baloo 2';font-size:16px;margin:0;}
  .kcal-big{font-family:'Baloo 2';font-size:44px;font-weight:800;color:var(--honey-dark);line-height:1;}
  .kcal-label{font-size:11.5px;color:var(--walnut-soft);}
  .macro-bars{display:flex;flex-direction:column;gap:10px;margin:16px 0 20px;}
  .mbar-row{display:flex;align-items:center;gap:10px;}
  .mbar-label{width:56px;font-size:12px;font-weight:600;}
  .mbar-track{flex:1;height:10px;border-radius:100px;background:var(--cream-dark);overflow:hidden;}
  .mbar-fill{height:100%;border-radius:100px;}
  .mbar-val{width:52px;text-align:right;font-family:'JetBrains Mono';font-size:11.5px;color:var(--walnut-soft);}
  .breakdown{border-top:1px solid var(--line);padding-top:14px;}
  .b-row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;color:var(--walnut-soft);}
  .b-row span:first-child{color:var(--walnut);font-weight:600;}
  .note{font-size:11px;color:var(--walnut-soft);opacity:0.8;margin-top:14px;line-height:1.5;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(62,46,34,0.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:420px;max-height:86vh;overflow:auto;}
  .modal h3{font-family:'Baloo 2';margin:0 0 14px;font-size:17px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--walnut-soft);margin-bottom:5px;}
  .field input, .field select{width:100%;padding:9px 10px;border-radius:10px;border:1.5px solid var(--line);font-family:'Inter';font-size:13px;background:var(--cream-dark);}
  .field input:focus, .field select:focus{outline:none;border-color:var(--honey);}
  .em-preview{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .em-preview .big{font-size:22px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pick-list{max-height:220px;overflow:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  .pick-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:10px;cursor:pointer;font-size:13px;}
  .pick-item:hover{background:var(--cream-dark);}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-actions button{flex:1;padding:10px;border-radius:12px;border:none;font-weight:700;font-family:'Baloo 2';font-size:13.5px;cursor:pointer;}
  .btn-primary{background:var(--honey);color:#fff;}
  .btn-secondary{background:var(--cream-dark);color:var(--walnut);}
  .close-x{position:absolute;top:16px;right:18px;border:none;background:none;font-size:18px;cursor:pointer;color:var(--walnut-soft);}
  .modal{position:relative;}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--walnut);color:var(--cream);padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  /* auth */
  .login-btn{background:var(--card);color:var(--walnut);border:1.5px solid var(--line);border-radius:100px;padding:10px 18px;font-family:'Baloo 2';font-weight:700;font-size:13.5px;cursor:pointer;}
  .login-btn:hover{border-color:var(--honey);}
  .user-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--line);border-radius:100px;padding:6px 14px 6px 6px;cursor:pointer;font-size:13px;font-weight:600;}
  .user-chip .avatar{width:26px;height:26px;border-radius:50%;background:var(--honey);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Baloo 2';font-size:13px;flex:0 0 auto;overflow:hidden;}
  .user-chip .avatar img{width:100%;height:100%;object-fit:cover;}
  .login-choice{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
  .login-choice button{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:14px;border:1.5px solid var(--line);background:var(--cream-dark);font-family:'Baloo 2';font-weight:700;font-size:14px;cursor:pointer;}
  .login-choice button:hover{transform:translateY(-1px);}
  .login-choice .g-ic{width:18px;height:18px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#4285F4;}
  .login-choice .k-ic{width:18px;height:18px;background:#FEE500;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#3C1E1E;}

  .stream{opacity:0;transition:opacity .12s;}
  .stream.active{opacity:1;}

  /* share */
  .share-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .share-item{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:14px;border:1.5px solid var(--line);background:var(--cream-dark);cursor:pointer;font-size:13.5px;font-weight:700;font-family:'Baloo 2';transition:transform .12s ease;}
  .share-item:hover{transform:translateY(-2px);}
  .share-item .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex:0 0 auto;}
  .share-preview{background:var(--cream-dark);border-radius:12px;padding:12px;font-size:12px;color:var(--walnut-soft);white-space:pre-wrap;max-height:130px;overflow:auto;margin-bottom:12px;line-height:1.55;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="mark">🥣</div>
      <div>
        <h1>오나오 랩</h1>
        <div class="sub">스푼으로 재료를 더하고, 밀크를 조로록 부어서 나만의 오버나이트 오트밀을 만들어보세요</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <div id="authArea"></div>
      <button class="save-btn" id="shareBtn" style="background:var(--sage-dark);">🔗 공유하기</button>
      <button class="save-btn" id="saveRecipeBtn">+ 이 레시피 저장하기</button>
    </div>
  </header>

  <div style="display:flex;align-items:center;gap:8px;">
    <button class="fav-filter-btn" id="favFilterBtn">⭐ 즐겨찾기만</button>
  </div>
  <div class="rail" id="rail"></div>

  <div class="grid">
    <!-- bowl / ingredients -->
    <div class="panel bowl-stage">
      <input class="recipe-name-input" id="recipeNameInput" value="바나나 피넛버터 오트밀" />
      <svg class="bowl" viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="100" cy="178" rx="58" ry="9" fill="rgba(62,46,34,0.08)"></ellipse>
        <!-- jar body (behind contents) -->
        <path d="M62,34 L62,158 Q62,172 78,172 L122,172 Q138,172 138,158 L138,34 Z" fill="#FBF7EE"></path>
        <clipPath id="jarClip"><path d="M65,34 L65,157 Q65,169 79,169 L121,169 Q135,169 135,157 L135,34 Z"/></clipPath>
        <g clip-path="url(#jarClip)">
          <g id="layerStack"></g>
          <rect id="liquidFill" x="60" y="160" width="80" height="0" fill="#EFE0BE" opacity="0.8"></rect>
          <g id="chunkLayer"></g>
        </g>
        <!-- glass outline + highlight -->
        <path d="M62,34 L62,158 Q62,172 78,172 L122,172 Q138,172 138,158 L138,34 Z" fill="none" stroke="#C9B48D" stroke-width="3"></path>
        <path d="M70,48 L70,140" stroke="rgba(255,255,255,0.75)" stroke-width="4" stroke-linecap="round"></path>
        <!-- jar mouth rim -->
        <rect x="56" y="24" width="88" height="12" rx="6" fill="#F3E7CC" stroke="#C9B48D" stroke-width="2.5"></rect>
        <line id="pourStream" class="stream" x1="100" y1="0" x2="100" y2="50" stroke="#EFE0BE" stroke-width="7" stroke-linecap="round"></line>
      </svg>

      <div class="spoons-block">
        <div id="ingList"></div>
        <button class="add-ing-btn" id="addIngBtn">+ 재료 추가하기</button>
        <div class="note" style="margin-top:8px;">🥄 1스푼 = 15g 기준으로 계산돼요 (0.5스푼 단위 조절 가능)</div>
      </div>

      <div class="liquid-block">
        <div class="liquid-title">🧃 밀크 붓기</div>
        <div class="liquid-choices" id="liquidChoices"></div>
        <div class="ml-row">
          <input type="range" id="mlSlider" min="0" max="300" step="10" value="120" />
          <div class="ml-val" id="mlVal">120 ml</div>
        </div>
      </div>
    </div>

    <!-- nutrition -->
    <div class="panel">
      <div class="n-head">
        <h2>영양 정보</h2>
        <div style="text-align:right">
          <div class="kcal-big" id="kcalBig">0</div>
          <div class="kcal-label">kcal</div>
        </div>
      </div>
      <div class="macro-bars" id="macroBars"></div>
      <div class="breakdown" id="breakdown"></div>
      <div class="note">* 일반적인 영양성분 데이터베이스 기준 추정치이며, 실제 제품·브랜드에 따라 다를 수 있어요.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- Data ---------------- */
// per-spoon (15g) macro values, derived from ~100g reference data
const G_PER_SPOON = 15;
function per100(kcal,p,c,f,fb){ return {kcal,p,c,f,fb}; }
const REF = { // per 100g
  oats:      per100(389,16.9,66.3,6.9,10.6),
  chia:      per100(486,16.5,42.1,30.7,34.4),
  flax:      per100(534,18.3,28.9,42.2,27.3),
  peanutbutter: per100(588,25,20,50,6),
  almondbutter: per100(614,21,19,56,10),
  honey:     per100(304,0.3,82.4,0,0.2),
  maple:     per100(260,0,67,0.2,0),
  cocoa:     per100(228,19.6,57.9,13.7,37),
  banana:    per100(89,1.1,22.8,0.3,2.6),
  blueberry: per100(57,0.7,14.5,0.3,2.4),
  strawberry:per100(32,0.7,7.7,0.3,2),
  mango:     per100(60,0.8,15,0.4,1.6),
  coconutflake: per100(660,6.9,23.7,64.5,16.3),
  yogurt:    per100(59,10.2,3.6,0.4,0),
  protein:   per100(380,80,8,5,2),
  cinnamon:  per100(247,4,80.6,1.2,53.1),
  walnut:    per100(654,15.2,13.7,65.2,6.7),
};
const INGREDIENTS = [
  {key:'oats', name:'압착 귀리', emoji:'🌾', color:'#D9C193'},
  {key:'chia', name:'치아씨드', emoji:'🟤', color:'#8A7663'},
  {key:'flax', name:'아마씨', emoji:'🌱', color:'#B5915C'},
  {key:'peanutbutter', name:'땅콩버터', emoji:'🥜', color:'#C88F4E'},
  {key:'almondbutter', name:'아몬드버터', emoji:'🌰', color:'#C9A06B'},
  {key:'honey', name:'꿀', emoji:'🍯', color:'#E8B54A'},
  {key:'maple', name:'메이플시럽', emoji:'🍁', color:'#B96F35'},
  {key:'cocoa', name:'코코아파우더', emoji:'🍫', color:'#6B4A35'},
  {key:'banana', name:'바나나', emoji:'🍌', color:'#F0D97C'},
  {key:'blueberry', name:'블루베리', emoji:'🫐', color:'#7A6FA8'},
  {key:'strawberry', name:'딸기', emoji:'🍓', color:'#E28A9B'},
  {key:'mango', name:'망고', emoji:'🥭', color:'#F2B457'},
  {key:'coconutflake', name:'코코넛플레이크', emoji:'🥥', color:'#F1E9DA'},
  {key:'yogurt', name:'그릭요거트', emoji:'🥣', color:'#F4EEE2'},
  {key:'protein', name:'프로틴파우더', emoji:'🥤', color:'#D8CBB8'},
  {key:'cinnamon', name:'시나몬', emoji:'🍂', color:'#A9683C'},
  {key:'walnut', name:'호두', emoji:'🟫', color:'#9B7B5B'},
];
const DEFAULT_LAYER_COLOR = '#D9C193';
const ING_BY_KEY = {}; INGREDIENTS.forEach(i=>ING_BY_KEY[i.key]=i);

// liquids: per 100ml

}

/* ---------------- Storage (works in Claude artifact via window.storage,
   falls back to browser localStorage once deployed standalone) ---------------- */
function hasArtifactStorage(){ return typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function'; }
async function storageGet(key){
  if(hasArtifactStorage()){
    try{ const r = await window.storage.get(key); return r ? r.value : null; }catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasArtifactStorage()){
    try{ await window.storage.set(key, value); return; }catch(e){ /* fall through */ }
  }
  try{ localStorage.setItem(key, value); }catch(e){}
}

/* ---------------- AI ingredient analysis ---------------- */
async function analyzeIngredient(name){
  const prompt = `식재료 "${name}"에 대해 다음 JSON만 답해. 마크다운, 설명, 백틱 없이 JSON 객체 하나만:\n{"emoji":"이 재료를 가장 잘 나타내는 이모지 1개","color":"이 재료의 실제 색을 나타내는 hex 색상코드","kcal":100g당 칼로리 숫자,"protein":100g당 단백질 g 숫자,"carb":100g당 탄수화물 g 숫자,"fat":100g당 지방 g 숫자,"fiber":100g당 식이섬유 g 숫자}\n일반적인 영양성분 데이터베이스 기준 대표값을 사용해.`;
  let obj;
  try{
    // Path A: works inside Claude artifact preview (no key needed, proxied)
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 300,
        messages: [{ role: "user", content: prompt }]
      })
    });
    if(!res.ok) throw new Error('direct call unavailable');
    const data = await res.json();
    const text = data.content.filter(i=>i.type==='text').map(i=>i.text).join('');
    obj = JSON.parse(text.replace(/```json|```/g,'').trim());
  }catch(e1){
    // Path B: deployed site -> hit our own serverless proxy (/api/analyze) which holds the key server-side
    const res2 = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name })
    });
    const data2 = await res2.json();
    if(!res2.ok) throw new Error(data2.error || '분석 실패');
    obj = data2;
  }
  return {
    emoji: obj.emoji || suggestEmoji(name),
    color: /^#[0-9a-fA-F]{6}$/.test(obj.color||'') ? obj.color : DEFAULT_LAYER_COLOR,
    ref: per100(+obj.kcal||0, +obj.protein||0, +obj.carb||0, +obj.fat||0, +obj.fiber||0),
    matchedExisting: !!obj.matchedExisting,
    sourceName: obj.sourceName || null
  };
}

/* ---------------- Drag-and-drop reordering (mouse + touch via Pointer Events) ---------------- */
let dragState = null;
function onDragHandleDown(e){
  e.preventDefault();
  const idx = parseInt(e.currentTarget.dataset.idx);
  const list = document.getElementById('ingList');
  const rowEl = list.children[idx];
  if(!rowEl) return;
  dragState = { idx, pointerId: e.pointerId };
  rowEl.classList.add('dragging');
  window.addEventListener('pointermove', onDragMove);
  window.addEventListener('pointerup', onDragUp);
  window.addEventListener('pointercancel', onDragUp);
}
function onDragMove(e){
  if(!dragState) return;
  e.preventDefault();
  const list = document.getElementById('ingList');
  const rows = Array.from(list.children);
  rows.forEach(r=>r.classList.remove('drag-hover'));
  let targetIdx = rows.length - 1;
  for(let i=0;i<rows.length;i++){
    const rect = rows[i].getBoundingClientRect();
    if(e.clientY < rect.top + rect.height/2){ targetIdx = i; break; }
  }
  if(targetIdx !== dragState.idx){
    const arr = currentRecipe.ingredients;
    const [moved] = arr.splice(dragState.idx, 1);
    arr.splice(targetIdx, 0, moved);
    dragState.idx = targetIdx;
    renderIngredients();
    renderBowl();
    const list2 = document.getElementById('ingList');
    if(list2.children[targetIdx]) list2.children[targetIdx].classList.add('dragging');
  } else if(rows[targetIdx]) {
    rows[targetIdx].classList.add('drag-hover');
  }
}
function onDragUp(){
  if(!dragState) return;
  dragState = null;
  window.removeEventListener('pointermove', onDragMove);
  window.removeEventListener('pointerup', onDragUp);
  window.removeEventListener('pointercancel', onDragUp);
  document.querySelectorAll('.ing-row').forEach(r=>{ r.classList.remove('dragging'); r.classList.remove('drag-hover'); });
}

        ${nutrients.map(([n,v])=>`<tr><td>${n}</td><td>${fmt(perSpoon(v))} g</td><td>${fmt(inRecipe(v))} g</td></tr>`).join('')}
      </table>

function renderBowl(){
  const SVG = 'http://www.w3.org/2000/svg';
  const JAR_L = 65, JAR_R = 135;      // jar interior walls
  const JAR_BOTTOM = 168;             // jar floor
  const JAR_MAX_H = 128;              // max fill height (solids + liquid)
  const JAR_W = JAR_R - JAR_L;
  const liquid = LIQ_BY_KEY[currentRecipe.liquid] || LIQUIDS[0];
  const stream = document.getElementById('pourStream');
  stream.setAttribute('stroke', liquid.color);

  // --- 1) solid ingredients stack up as layers, in list order (first = bottom) ---
  const stack = document.getElementById('layerStack');
  stack.innerHTML = '';
  const totalSpoons = currentRecipe.ingredients.reduce((s,r)=>s+r.spoons,0);
  const mlUnits = currentRecipe.ml / 30;           // 30ml ≈ 1 spoon of visual height
  const totalUnits = Math.max(totalSpoons + mlUnits, 1);
  const unitH = Math.min(JAR_MAX_H / totalUnits, 14); // squish when jar gets full

  let yCursor = JAR_BOTTOM;
  let seed = 11;
  currentRecipe.ingredients.forEach((row)=>{
    const meta = ING_BY_KEY[row.key] || {emoji:'🥣'};
    const color = (meta.color) || DEFAULT_LAYER_COLOR;
    const layerH = Math.max(row.spoons * unitH, 5);
    const yTop = yCursor - layerH;

    // layer band with a gently wavy top edge
    seed += 29;
    const w = 1.5 + (seed % 2);
    const path = document.createElementNS(SVG,'path');
    path.setAttribute('d',
      `M${JAR_L},${yCursor} L${JAR_L},${yTop+w} Q${JAR_L+JAR_W*0.3},${yTop-w} 100,${yTop} Q${JAR_R-JAR_W*0.3},${yTop+w} ${JAR_R},${yTop-w*0.5} L${JAR_R},${yCursor} Z`);
    path.setAttribute('fill', color);
    stack.appendChild(path);

    // thin divider shadow on top of each layer so similar colors stay distinct
    const divider = document.createElementNS(SVG,'path');
    divider.setAttribute('d', `M${JAR_L},${yTop+w} Q${JAR_L+JAR_W*0.3},${yTop-w} 100,${yTop} Q${JAR_R-JAR_W*0.3},${yTop+w} ${JAR_R},${yTop-w*0.5}`);
    divider.setAttribute('fill','none');
    divider.setAttribute('stroke','rgba(62,46,34,0.22)');
    divider.setAttribute('stroke-width','1.2');
    stack.appendChild(divider);

    // speckle texture inside the layer
    const speckles = Math.min(row.spoons * 3, 14);
    for(let i=0;i<speckles;i++){
      seed += 53;
      const cx = JAR_L + 5 + ((seed*37) % (JAR_W - 10));
      const cy = yTop + 3 + ((seed*19) % Math.max(layerH-5,1));
      const dot = document.createElementNS(SVG,'circle');
      dot.setAttribute('cx',cx); dot.setAttribute('cy',cy);
      dot.setAttribute('r', 0.9 + ((seed%3)*0.4));
      dot.setAttribute('fill','rgba(62,46,34,0.20)');
      stack.appendChild(dot);
    }
    yCursor = yTop;
  });
  const solidsTop = yCursor;

  // --- 2) liquid pools on top of the solid pile ---
  const fill = document.getElementById('liquidFill');
  fill.setAttribute('fill', liquid.color);
  const remaining = Math.max(solidsTop - (JAR_BOTTOM - JAR_MAX_H), 0);
  const lh = Math.max(Math.min(mlUnits * unitH, remaining), 0);
  fill.setAttribute('y', solidsTop - lh);
  fill.setAttribute('height', lh);

  // --- 3) toppings removed: emoji jittered on every change ---
  document.getElementById('chunkLayer').innerHTML = '';
}

/* ---------------- Nutrition ---------------- */
function computeNutrition(){
  let kcal=0,p=0,c=0,f=0,fb=0;
  const rows = [];
  currentRecipe.ingredients.forEach(row=>{
    const ref = REF[row.key];
    const meta = ING_BY_KEY[row.key];
    if(!ref || !meta) return;
    const grams = row.spoons * G_PER_SPOON;
    const factor = grams/100;
    const k = ref.kcal*factor;
    kcal += k; p += ref.p*factor; c += ref.c*factor; f += ref.f*factor; fb += ref.fb*factor;
    rows.push({name:meta.name, emoji:meta.emoji, kcal:k});
  });
  const liquid = LIQ_BY_KEY[currentRecipe.liquid];
  if(liquid){
    const factor = currentRecipe.ml/100;
    const k = liquid.ref.kcal*factor;
    kcal += k; p += liquid.ref.p*factor; c += liquid.ref.c*factor; f += liquid.ref.f*factor; fb += liquid.ref.fb*factor;
    rows.push({name:liquid.name, emoji:liquid.emoji, kcal:k});
  }
  return {kcal,p,c,f,fb,rows};
}

function renderNutrition(){
  const n = computeNutrition();
  document.getElementById('kcalBig').textContent = Math.round(n.kcal);
  const macros = [
    {label:'단백질', val:n.p, color:'var(--sage)'},

  ];
  const maxVal = Math.max(...macros.map(m=>m.val), 1);
  const bars = document.getElementById('macroBars');

    row.innerHTML = `<div class="mbar-label">${m.label}</div><div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${m.color}"></div></div><div class="mbar-val">${m.val.toFixed(1)}g</div>`;
    bars.appendChild(row);

/* ---------------- Shareable link (recipe travels inside the URL) ---------------- */
/* base64url helpers (UTF-8 safe) — far more compact than percent-encoding for Korean text */
function utf8ToBase64Url(str){
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64UrlToUtf8(b64url){
  let b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length % 4) b64 += '=';
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
function safeShareBase(){
  // window.location.origin is "null" inside Claude's sandboxed preview iframe (srcdoc) —
  // guard against that so we never emit a garbage "nullsrcdoc" URL. On the real deployed
  // site (Vercel etc.) this always resolves to the normal https://your-domain/ URL.
  const origin = window.location.origin;
  if(origin && origin !== 'null' && window.location.protocol !== 'about:'){
    return origin + window.location.pathname;
  }
  return window.location.href.split(/[?#]/)[0];
}

function buildShareUrl(){
  // bundle any custom (AI-analyzed) ingredients this recipe uses, so the person
  // opening the link sees correct emoji/color/nutrition even if they've never added them
  const customDefs = [];
  currentRecipe.ingredients.forEach(row=>{
    const isBuiltIn = INGREDIENTS.some(i=>i.key===row.key);
    if(!isBuiltIn && ING_BY_KEY[row.key] && REF[row.key]){
      const m = ING_BY_KEY[row.key];
      customDefs.push([row.key, m.name, m.emoji, m.color || '', REF[row.key]]);
    }
  });
  // compact payload: short keys + [key,spoons] tuples instead of named objects
  const payload = {
    n: currentRecipe.name,
    e: currentRecipe.emoji || '🥣',
    i: currentRecipe.ingredients.map(r => [r.key, r.spoons]),
    l: currentRecipe.liquid,
    m: currentRecipe.ml,
    c: customDefs
  };
  const encoded = utf8ToBase64Url(JSON.stringify(payload));
  return safeShareBase() + '?r=' + encoded;
}

function loadRecipeFromUrl(){
  try{
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('r');
    if(!raw) return false;

    let payload;
    try{ payload = JSON.parse(base64UrlToUtf8(raw)); }
    catch(e){ payload = JSON.parse(decodeURIComponent(raw)); } // backward-compat with old links

    // support both compact (n/e/i/l/m/c) and legacy (name/emoji/ingredients/...) formats
    const name = payload.n ?? payload.name;
    const emoji = payload.e ?? payload.emoji;
    const liquid = payload.l ?? payload.liquid;
    const ml = payload.m ?? payload.ml;
    const ingredients = (payload.i ?? payload.ingredients ?? []).map(row=>
      Array.isArray(row) ? {key: row[0], spoons: row[1]} : row
    );
    const customDefs = (payload.c ?? payload.customDefs ?? []).map(d=>
      Array.isArray(d) ? {key:d[0], name:d[1], emoji:d[2], color:d[3], ref:d[4]} : d
    );
    if(!ingredients.length) return false;

    customDefs.forEach(d=>{
      ING_BY_KEY[d.key] = {key:d.key, name:d.name, emoji:d.emoji, color:d.color};
      REF[d.key] = d.ref;
      indexIngredient(d.key, d.name);
    });
    currentRecipe = {
      id: 'shared-' + Date.now(),
      name: name || '공유받은 오트밀',
      emoji: emoji || '🥣',
      ingredients,
      liquid: liquid || 'oatmilk',
      ml: typeof ml === 'number' ? ml : 150
    };
    currentRecipeSourceId = currentRecipe.id;
    // clean the URL so further edits don't carry stale share data on refresh
    history.replaceState(null, '', window.location.pathname);
    showToast('공유받은 레시피를 불러왔어요 🥣 마음에 들면 저장해보세요!');
    return true;
  }catch(e){ console.warn('공유 링크 파싱 실패', e); return false; }
}

async function copyText(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); return true; }
    catch(e2){ return false; }
    finally{ document.body.removeChild(ta); }
  }
}

    area.innerHTML = `<button class="login-btn" id="loginBtn">👤 로그인</button>`;
    document.getElementById('loginBtn').onclick = openLoginModal;
  }
}

function openLoginModal(){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="close-x">✕</button>
      <h3>로그인하고 레시피 동기화하기</h3>
      <div class="note" style="margin-top:0;">로그인하면 저장한 레시피를 다른 기기에서도 그대로 불러올 수 있어요.</div>
      <div class="login-choice">
        <button id="loginGoogle"><span class="g-ic">G</span> Google로 계속하기</button>
        <button id="loginKakao"><span class="k-ic">K</span> 카카오로 계속하기</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('.close-x').onclick = ()=>document.body.removeChild(overlay);
  overlay.onclick = (e)=>{ if(e.target===overlay) document.body.removeChild(overlay); };

  const startLogin = async (provider)=>{
    if(!sb){ showToast('로그인 준비가 안 됐어요. 잠시 후 다시 시도해주세요'); return; }
    const { error } = await sb.auth.signInWithOAuth({
      provider,
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
    if(error) showToast(`로그인 실패: ${error.message}`);
  };
  overlay.querySelector('#loginGoogle').onclick = ()=>startLogin('google');
  overlay.querySelector('#loginKakao').onclick = ()=>startLogin('kakao');
}

function openAccountModal(){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="close-x">✕</button>
      <h3>내 계정</h3>
      <div class="note" style="margin-top:0;">${currentUser.email || ''} · 저장된 레시피 ${cloudRecipes.length}개</div>
      <div class="modal-actions">
        <button class="btn-secondary" id="logoutBtn">로그아웃</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('.close-x').onclick = ()=>document.body.removeChild(overlay);
  overlay.onclick = (e)=>{ if(e.target===overlay) document.body.removeChild(overlay); };
  overlay.querySelector('#logoutBtn').onclick = async ()=>{
    await sb.auth.signOut();
    document.body.removeChild(overlay);
  };
}

async function loadCloudRecipes(){
  if(!sb || !currentUser){ cloudRecipes = []; return; }
  const { data, error } = await sb.from('recipes').select('*').order('updated_at', {ascending:false});
  if(error){ console.warn('클라우드 레시피 로드 실패:', error.message); return; }
  cloudRecipes = (data || []).map(r=>{
    (r.custom_defs || []).forEach(d=>{
      ING_BY_KEY[d.key] = {key:d.key, name:d.name, emoji:d.emoji, color:d.color};
      REF[d.key] = d.ref;
      indexIngredient(d.key, d.name);
    });
    return { id:'cloud-'+r.id, _cloud:true, _dbId:r.id, name:r.name, emoji:r.emoji, ingredients:r.ingredients, liquid:r.liquid, ml:r.ml, customDefs:r.custom_defs };
  });
  renderRail();
}

if(sb){
  sb.auth.onAuthStateChange(async (event, session)=>{
    currentUser = session ? session.user : null;
    renderAuthArea();
    if(currentUser){ await loadCloudRecipes(); await loadFavorites(); renderRail(); }
    else { cloudRecipes = []; await loadFavorites(); renderRail(); }
  });
}

/* ---------------- Init ---------------- */
try{
  if(window.Kakao && !window.Kakao.isInitialized()){
    window.Kakao.init('067bd42185ad4d6c723a2d6aad3b8f96');
  }
}catch(e){ console.warn('Kakao SDK 초기화 실패(허용 도메인 미등록 등):', e); }

loadCustomRecipes().then(async ()=>{
  if(sb){
    const { data:{ session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;
    renderAuthArea();
    if(currentUser) await loadCloudRecipes();
  }
  await loadFavorites();
  loadRecipeFromUrl();
  renderAll();
});
</script>
